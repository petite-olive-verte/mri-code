doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # Custom types translate domain value objects to/from scalar columns.
        types:
            task_id: App\Infrastructure\Doctrine\Type\TaskIdType
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                # XML mapping in Infrastructure keeps the domain model pure
                # (no ORM attributes on App\Domain\Model\*).
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Infrastructure/Doctrine/Mapping'
                prefix: 'App\Domain\Model'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'
